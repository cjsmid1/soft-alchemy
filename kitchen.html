<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soft Alchemy</title>
  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="preload" as="image" href="images/watercolour-background.jpg">
  <link rel="preload" as="image" href="images/watercolour-background-dark.png">
</head>
<body>
  <header>
    <h1>The Kitchen</h1>
  </header>
  
  <section class="card">
    <h3>You're just in time for...</h3>
    <div id="latest-recipe-post"></div>
  </section>
  
  <section class="card reading-shelf">
    <h2>Currently Bubbling</h2>
    <div id="current-bubbling" class="shelf"></div>
  </section>

  <section class="card">
    <h2>Raid the Pantry</h2>
    <div class="photo-collage">
	  <a href="post.html?id=sourdough-starter"><img src="images/sourdough-starter.jpg"></a>
	  <a href="post.html?id=tuna-sweetcorn-dumplings"><img src="images/tuna-sweetcorn-dumplings.jpg"></a>
	  <a href="post.html?id=sourdough-bread"><img src="images/sourdough-bread-half.jpg"></a>
	  <a href="post.html?id=mushroom-wellington"><img src="images/mushroom-wellington-puff.jpg"></a>
	  
	  <a href="post.html?id=echo-first-birthday#birthday-cake">
        <img src="images/cake-cutting.jpg" alt="Dog birthday cake">
        <img class="paw-stamp" src="images/paw-print-handwritten.png" alt="">
      </a>
      </div>
  </section>
  
  <script src="books.js"></script>
  <script src="posts.js"></script>
  <script src="script.js"></script>
  <script>
  renderBookshelf("current-bubbling", currentBubbling);
  renderLatestPost("latest-recipe-post", "Recipe");
  </script>
</body>
</html>
