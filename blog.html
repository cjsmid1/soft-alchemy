<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Archive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="preload" as="image" href="images/watercolour-background.jpg">
  <link rel="preload" as="image" href="images/watercolour-background-dark.png">
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-563L2Z66XJ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-563L2Z66XJ');
</script>

<body>
  <div class="filters">
    <button id="randomPostBtn" class="archive-paw-button" type="button" aria-label="Open a random post">
      <img src="images/paw-print-handwritten.png" alt="">
    </button>
    <input type="text" id="search" placeholder="Search posts...">
    <select id="categoryFilter">
      <option value="">All Categories</option>
    </select>
  </div>
  
  <div id="tags"></div>
  
  <main id="posts"></main>
    
  <script src="posts.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
