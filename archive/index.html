  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>

  <link rel="stylesheet" href="/css/main.css" />
  <link rel="preload" as="image" href="/images/background/watercolour-loop-light.png" />
  <link rel="preload" as="image" href="/images/background/watercolour-loop-dark.png" />

  <!-- Google tag (gtag.js) -->

<body>
  <div class="filters">
    <button id="randomPostBtn" class="archive-paw-button" type="button" aria-label="Open a random post">
      <img src="/images/handwriting/paw-print-handwritten.png" alt="" />
    </button>
  
    <input type="text" id="search" placeholder="Search posts..." />
  
    <div class="archive-filter-menu" id="archiveFilterMenu">
      <button class="archive-filter-toggle" type="button">
        Filters ▾
      </button>
  
      <div class="archive-filter-panel">
        <p class="filter-section-label">Display</p>
  
        <label>
          <input type="checkbox" id="showPosts" checked>
          <span>Posts</span>
        </label>
        
        <label>
          <input type="checkbox" id="showUpdates">
          <span>Updates</span>
        </label>
        
        <p class="filter-section-label">Categories</p>
        <label>
          <input type="radio" name="archiveCategory" value="" checked>
          <span>All Categories</span>
        </label>
  
        <div id="categoryOptions"></div>
      </div>
    </div>
  </div>

  <div id="tags"></div>

  <main id="posts"></main>

  <script src="/js/posts.js" defer></script>
  <script src="/js/updates.js" defer></script>
  <script src="/js/script.js" defer></script>
  <script src="/js/update-render.js" defer></script>
</body>

</html>
